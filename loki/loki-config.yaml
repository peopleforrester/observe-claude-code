# ABOUTME: Single-binary Loki config for the demo — native OTLP ingestion with structured metadata.
# ABOUTME: Structured metadata requires the tsdb index and v13 schema, both set below.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# tsdb + v13 are mandatory for structured metadata (where OTLP log/record attributes land).
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 0s

ruler:
  alertmanager_url: http://localhost:9093
