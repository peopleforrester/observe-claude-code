# ABOUTME: OTel Collector config — one OTLP receiver fanning to Prometheus, Loki, and Jaeger.
# ABOUTME: All-OTLP exporters; the commercial backend is added as a second exporter per pipeline later.
extensions:
  # Liveness endpoint probed by the test suite (the image is distroless, no in-container probe).
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Metrics -> Prometheus native OTLP receiver (otlphttp appends /v1/metrics).
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
  # Logs/events -> Loki native OTLP endpoint (otlphttp appends /v1/logs).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Traces -> Jaeger OTLP gRPC.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Capture every signal to a JSON-lines file for offline replay (the stage safety net).
  # Mounted to demo/replay/raw on the host; a curated sample is committed for replay.
  file/capture:
    path: /replay/otlp-capture.jsonl

  # --- Datadog (Nick) — final phase, parked until approval (see docs/ownership.md) ---
  # Define the Datadog exporter here, then add it as a SECOND exporter on each pipeline below
  # so the identical OTLP stream fans to Datadog alongside the CNCF stack. Key via ~/secrets,
  # never committed. Uncomment and configure when the Datadog work is approved:
  # datadog:
  #   api:
  #     site: ${env:DD_SITE}
  #     key: ${env:DD_API_KEY}

service:
  extensions: [health_check]
  pipelines:
    # Nick adds `datadog` as a second exporter in each list below (e.g. [otlphttp/prometheus, datadog]).
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/prometheus, file/capture]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, file/capture]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, file/capture]
